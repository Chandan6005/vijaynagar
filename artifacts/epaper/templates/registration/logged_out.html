{% extends 'base.html' %}
{% block title %}Logged Out - Vijayanagar Record{% endblock %}

{% block extra_css %}
<style>
    .logout-page {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
    }

    .logout-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 32px;
        max-width: 520px;
        text-align: center;
        box-shadow: 0 8px 32px var(--shadow);
    }

    .logout-card h1 {
        font-family: 'Playfair Display', serif;
        margin-bottom: 16px;
    }

    .logout-card p {
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .logout-card .btn {
        margin-top: 12px;
    }
</style>
{% endblock %}

{% block content %}
<div class="logout-page">
    <div class="logout-card">
        <h1>You're signed out</h1>
        <p>Thanks for visiting Vijayanagar Record. Your session has been safely closed.</p>
        <a href="{% url 'home' %}" class="btn btn-primary">Return to Home</a>
    </div>
</div>
{% endblock %}
